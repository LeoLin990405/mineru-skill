name: Bug Report
description: Report a bug with mineru-skill
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `mineru-parse.sh ...`
        2. See error ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      description: Your operating system
      placeholder: "macOS 14.0 / Ubuntu 22.04 / ..."
  - type: input
    id: shell
    attributes:
      label: Shell
      placeholder: "bash 5.2 / zsh 5.9 / ..."
  - type: textarea
    id: logs
    attributes:
      label: Error Output
      description: Paste any error messages or logs
      render: shell
